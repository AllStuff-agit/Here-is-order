name: Verify and deploy

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hereisorder-production-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify API, migrations, and web
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.23.1'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install API dependencies
        run: npm ci

      - name: Type-check API
        run: npm run typecheck

      - name: Test API and deployment contracts
        run: npm test

      - name: Validate Worker bundle
        run: npm run build

      - name: Validate D1 migrations locally
        run: npm exec -- wrangler d1 migrations apply hereisorder --local --persist-to /tmp/hereisorder-ci

      - name: Install web dependencies
        run: npm ci --prefix frontend

      - name: Test web contract adapters
        run: npm run test --prefix frontend

      - name: Lint web
        run: npm run lint --prefix frontend

      - name: Build web
        run: npm run build --prefix frontend

      - name: Validate Cloudflare web bundle
        run: npm run build:cloudflare --prefix frontend

  d1-rest-batch-contract:
    name: Verify remote D1 REST batch rollback
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.23.1'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify D1 REST batch rollback
        run: npm run test:d1-rest-batch-contract
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CONTRACT_RUN_ID: ${{ github.run_id }}
          CONTRACT_RUN_ATTEMPT: ${{ github.run_attempt }}

  production-preflight:
    name: Capture production recovery checkpoint
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: d1-rest-batch-contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.23.1'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Capture production recovery checkpoint
        run: npm run deploy:preflight
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-api:
    name: Deploy API Worker
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs:
      - verify
      - d1-rest-batch-contract
      - production-preflight
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      api-url: ${{ steps.verify-api.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.23.1'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply production D1 migrations
        run: npm exec -- wrangler d1 migrations apply hereisorder --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy API Worker
        run: npm exec -- wrangler deploy --message "$GITHUB_SHA" --strict
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_OUTPUT_FILE_PATH: ${{ runner.temp }}/hereisorder-api-deploy.ndjson

      - name: Verify API active Worker version
        id: verify-api
        run: node scripts/verify-worker-deployment.mjs api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_OUTPUT_FILE_PATH: ${{ runner.temp }}/hereisorder-api-deploy.ndjson

      - name: Smoke test API deployment
        env:
          DEPLOYMENT_URL: ${{ steps.verify-api.outputs.deployment-url }}
        run: node scripts/smoke-deployment.mjs api "$DEPLOYMENT_URL"

  deploy-web:
    name: Deploy web Worker
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs:
      - verify
      - deploy-api
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.23.1'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Build production web Worker
        run: npm run build:cloudflare --prefix frontend
        env:
          API_PROXY_URL: ${{ needs.deploy-api.outputs.api-url }}

      - name: Deploy web Worker
        working-directory: frontend
        run: npm exec -- opennextjs-cloudflare deploy --message "$GITHUB_SHA" --strict
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_OUTPUT_FILE_PATH: ${{ runner.temp }}/hereisorder-web-deploy.ndjson

      - name: Verify web active Worker version
        id: verify-web
        run: node scripts/verify-worker-deployment.mjs web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_OUTPUT_FILE_PATH: ${{ runner.temp }}/hereisorder-web-deploy.ndjson

      - name: Smoke test web deployment and API proxy
        env:
          DEPLOYMENT_URL: ${{ steps.verify-web.outputs.deployment-url }}
        run: node scripts/smoke-deployment.mjs web "$DEPLOYMENT_URL"
